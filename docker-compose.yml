version: "3.9"
services:
  url-check-backend:
    build:
      context: ./backend
    container_name: url-check-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config:/app/config
    restart: unless-stopped

  url-check-frontend:
    build:
      context: ./frontend
    container_name: url-check-frontend
    ports:
      - "5173:80"
    depends_on:
      - url-check-backend
    restart: unless-stopped
