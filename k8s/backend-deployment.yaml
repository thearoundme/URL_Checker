apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-check-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-check-backend
  template:
    metadata:
      labels:
        app: url-check-backend
    spec:
      containers:
        - name: backend
          image: url-check-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: url-check-backend
spec:
  selector:
    app: url-check-backend
  ports:
    - port: 8000
      targetPort: 8000
